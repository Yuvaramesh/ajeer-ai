services:
  - type: web
    name: ajeer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false # set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: ajeer_faq
      - key: EXCHANGE_API_KEY
        sync: false
